<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMT Task Manager | {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0a192f; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .esmt-blue { background-color: #1e4d8c; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="{% url 'web:index' %}" class="flex items-center gap-3">
            <span class="text-xl font-bold tracking-tight text-white">ESMT <span class="text-teal-400">TaskManager</span></span>
        </a>
        <div class="flex items-center gap-6">
            {% if user.is_authenticated %}
                <a href="{% url 'web:dashboard' %}" class="hover:text-teal-400 transition">Tableau de Bord</a>
                <a href="{% url 'web:profile' %}" class="hover:text-teal-400 transition">Mon Profil ({{ user.username }})</a>
                <form action="{% url 'account_logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 px-4 py-2 rounded-lg transition">Déconnexion</button>
                </form>
            {% else %}
                <a href="{% url 'account_login' %}" class="hover:text-teal-400 transition">Connexion</a>
                <a href="{% url 'account_signup' %}" class="esmt-blue text-white px-5 py-2 rounded-lg hover:brightness-110 transition">Inscription</a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-white/10 mt-20 py-10 text-center text-gray-500 text-sm">
        &copy; 2026 ESMT Task Manager. Tous droits réservés.
    </footer>
</body>
</html>
